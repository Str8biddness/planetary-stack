<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Synthesus — Open Graph social card (1200x630)</title>
<!--
  SOURCE FILE for site/og.png. Self-contained: zero external requests.
  No webfonts, no CDN, no remote images, no SVG fetches — system font stack
  and pure CSS only.

  Render to PNG with headless Chromium:
    chromium --headless --disable-gpu --screenshot=site/og.png \
      --window-size=1200,630 --default-background-color=0 site/social-card.html
-->
<style>
  :root {
    --bg:       #070A10;  /* near-black   */
    --cyan:     #3AD0EF;  /* signal-cyan  */
    --violet:   #A78BFA;  /* violet       */
    --text:     #E6EDF3;  /* body text    */
    --muted:    #8B98A9;  /* muted        */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "DejaVu Sans", "Liberation Sans", Ubuntu, Cantarell,
                 "Helvetica Neue", Arial, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- instrument-console backdrop ---------- */

  .stage {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  /* engineering grid */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(58, 208, 239, 0.055) 1px, transparent 1px),
      linear-gradient(90deg, rgba(58, 208, 239, 0.055) 1px, transparent 1px),
      linear-gradient(rgba(58, 208, 239, 0.11) 1px, transparent 1px),
      linear-gradient(90deg, rgba(58, 208, 239, 0.11) 1px, transparent 1px);
    background-size: 30px 30px, 30px 30px, 150px 150px, 150px 150px;
  }

  /* soft instrument glow: cyan from the left, violet from the lower right */
  .glow {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(760px 420px at 12% 28%, rgba(58, 208, 239, 0.16), transparent 70%),
      radial-gradient(680px 460px at 92% 100%, rgba(167, 139, 250, 0.14), transparent 72%),
      radial-gradient(900px 600px at 50% 50%, transparent 45%, rgba(7, 10, 16, 0.85) 100%);
  }

  /* console frame + corner brackets */
  .frame {
    position: absolute;
    inset: 40px;
    border: 1px solid rgba(139, 152, 169, 0.22);
  }
  .frame::before,
  .frame::after {
    content: "";
    position: absolute;
    width: 34px;
    height: 34px;
  }
  .frame::before {
    top: -1px; left: -1px;
    border-top: 2px solid var(--cyan);
    border-left: 2px solid var(--cyan);
  }
  .frame::after {
    bottom: -1px; right: -1px;
    border-bottom: 2px solid var(--violet);
    border-right: 2px solid var(--violet);
  }

  /* ---------- content ---------- */

  .content {
    position: absolute;
    inset: 40px;
    padding: 54px 62px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 12px 2px rgba(58, 208, 239, 0.75);
  }
  .status .sep { color: rgba(139, 152, 169, 0.45); }

  .wordmark {
    margin-top: 30px;
    font-size: 108px;
    line-height: 1;
    font-weight: 700;
    letter-spacing: 0.10em;
    background-image: linear-gradient(100deg, var(--cyan) 0%, #BFE9F6 42%, var(--violet) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .rule {
    margin-top: 30px;
    width: 640px;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--violet) 62%, rgba(167, 139, 250, 0));
  }

  .tagline {
    margin-top: 30px;
    font-size: 40px;
    line-height: 1.25;
    font-weight: 500;
    color: var(--text);
  }

  .facts {
    margin-top: 34px;
    font-size: 19px;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .facts b {
    color: rgba(230, 237, 243, 0.9);
    font-weight: 600;
  }

  /* ---------- signal / tick strip (the console motif) ---------- */

  .signal {
    position: absolute;
    right: 104px;
    bottom: 78px;
    display: flex;
    align-items: flex-end;
    gap: 7px;
    height: 96px;
  }
  .signal i {
    display: block;
    width: 6px;
    border-radius: 1px;
    background: linear-gradient(180deg, var(--cyan), rgba(58, 208, 239, 0.12));
  }
  .signal i.v {
    background: linear-gradient(180deg, var(--violet), rgba(167, 139, 250, 0.12));
  }

  .ticks {
    position: absolute;
    left: 62px;
    bottom: 54px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    height: 18px;
  }
  .ticks i {
    display: block;
    width: 1px;
    height: 6px;
    background: rgba(139, 152, 169, 0.5);
  }
  .ticks i.tall {
    height: 16px;
    background: rgba(58, 208, 239, 0.8);
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="grid"></div>
    <div class="glow"></div>
    <div class="frame"></div>

    <div class="content">
      <div class="status">
        <span class="dot"></span>
        <span>Local</span>
        <span class="sep">/</span>
        <span>Offline</span>
        <span class="sep">/</span>
        <span>Synthetic Intelligence OS</span>
      </div>

      <div class="wordmark">SYNTHESUS</div>

      <div class="rule"></div>

      <div class="tagline">The AI that never leaves your machine.</div>

      <div class="facts">
        Grounded in <b>your documents</b>
        &nbsp;&middot;&nbsp; <b>Cites</b> every claim
        &nbsp;&middot;&nbsp; Open source, <b>AGPL-3.0</b>
      </div>
    </div>

    <div class="ticks">
      <i class="tall"></i><i></i><i></i><i></i><i></i>
      <i class="tall"></i><i></i><i></i><i></i><i></i>
      <i class="tall"></i><i></i><i></i><i></i><i></i>
      <i class="tall"></i><i></i><i></i><i></i><i></i>
      <i class="tall"></i>
    </div>

    <div class="signal">
      <i style="height: 22px"></i>
      <i style="height: 41px"></i>
      <i style="height: 29px"></i>
      <i style="height: 63px"></i>
      <i style="height: 48px"></i>
      <i style="height: 82px"></i>
      <i style="height: 57px"></i>
      <i style="height: 96px"></i>
      <i style="height: 70px"></i>
      <i class="v" style="height: 88px"></i>
      <i class="v" style="height: 52px"></i>
      <i class="v" style="height: 66px"></i>
      <i class="v" style="height: 34px"></i>
      <i class="v" style="height: 45px"></i>
      <i class="v" style="height: 24px"></i>
      <i class="v" style="height: 15px"></i>
    </div>
  </div>
</body>
</html>
